<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #FFFFD4; color: #1e293b; min-height: 100vh; }

  header { background: #FC77AB; color: white; padding: 1.25rem 2rem; display: flex; align-items: center; gap: 1rem; }
  header h1 { font-size: 1.3rem; font-weight: 700; }
  header p  { font-size: .85rem; opacity: .75; margin-top: 2px; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #4ade80; margin-left: auto; box-shadow: 0 0 6px #4ade80; }

  .layout { display: grid; grid-template-columns: 360px 1fr; gap: 1.5rem; max-width: 1300px; margin: 1.5rem auto; padding: 0 1.5rem 3rem; }

  .card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
  .card-header { padding: .9rem 1.25rem; border-bottom: 1px solid #FFFFD4; display: flex; align-items: center; justify-content: space-between; }
  .card-header h2 { font-size: .95rem; font-weight: 600; }
  .card-body { padding: 1.25rem; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
  .form-group { margin-bottom: .85rem; }
  .form-group.full { grid-column: span 2; }
  label { display: block; font-size: .78rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .04em; margin-bottom: .3rem; }
  input[type=text], input[type=email] { width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: .88rem; transition: border-color .15s; outline: none; }
  input:focus { border-color: #FC77AB; }

  .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: .9rem; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s; }
  .btn:active { transform: scale(.98); }
  .btn-primary { background: #FC77AB; color: white; }
  .btn-primary:hover { opacity: .9; }
  .btn-cancel { background: #FFFFD4; color: #64748b; margin-top: .5rem; }
  .btn-cancel:hover { background: #e2e8f0; }

  .form-mode { display: inline-block; font-size: .75rem; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
  .mode-criar  { background: #FFFFD4; color: #FC77AB; }
  .mode-editar { background: #fef9c3; color: #854d0e; }

  .search-bar { display: flex; gap: .5rem; padding: 1rem 1.25rem; border-bottom: 1px solid #FFFFD4; }
  .search-bar input { flex: 1; padding: 8px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: .88rem; outline: none; }
  .search-bar input:focus { border-color: #FC77AB; }
  .btn-search { padding: 8px 16px; background: #FC77AB; color: white; border: none; border-radius: 8px; font-size: .85rem; cursor: pointer; }
  .btn-clear  { padding: 8px 12px; background: #FFFFD4; color: #64748b; border: none; border-radius: 8px; font-size: .85rem; cursor: pointer; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  thead tr { background: #f8fafc; }
  th { text-align: left; padding: .65rem 1rem; font-size: .72rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid #e2e8f0; }
  td { padding: .75rem 1rem; border-bottom: 1px solid #FFFFD4; color: #334155; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }

  .td-actions { display: flex; gap: .4rem; }
  .btn-edit { padding: 5px 12px; background: #fef9c3; color: #854d0e; border: 1px solid #fde68a; border-radius: 6px; font-size: .78rem; cursor: pointer; font-weight: 600; }
  .btn-edit:hover { background: #fde68a; }
  .btn-del  { padding: 5px 12px; background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; border-radius: 6px; font-size: .78rem; cursor: pointer; font-weight: 600; }
  .btn-del:hover { background: #fca5a5; }

  .empty { text-align: center; padding: 3rem; color: #94a3b8; font-size: .9rem; }
  .count-badge { background: #FFFFD4; color: #FC77AB; font-size: .75rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; }

  #toast { position: fixed; bottom: 1.5rem; right: 1.5rem; padding: .75rem 1.25rem; border-radius: 10px; font-size: .88rem; font-weight: 600; color: white; opacity: 0; transition: opacity .3s; z-index: 999; pointer-events: none; }
  #toast.show { opacity: 1; }
  #toast.success { background: #16a34a; }
  #toast.error   { background: #dc2626; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Cadastro de Clientes</h1>
    <p>Flask + PostgreSQL</p>
  </div>
  <div class="status-dot"></div>
</header>

<div class="layout">

  <div>
    <div class="card">
      <div class="card-header">
        <h2>Formulário</h2>
        <span class="form-mode mode-criar" id="form-mode">Novo cliente</span>
      </div>
      <div class="card-body">
        <input type="hidden" id="edit-id" />

        <div class="form-group">
          <label>Nome completo *</label>
          <input type="text" id="f-nome" placeholder="Ex: Ana Silva" />
        </div>
        <div class="form-group">
          <label>E-mail *</label>
          <input type="email" id="f-email" placeholder="Ex: ana@email.com" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Telefone</label>
            <input type="text" id="f-telefone" placeholder="(11) 99999-9999" />
          </div>
          <div class="form-group">
            <label>Cidade</label>
            <input type="text" id="f-cidade" placeholder="Ex: São Paulo" />
          </div>
        </div>
        <div class="form-group">
          <label>Empresa</label>
          <input type="text" id="f-empresa" placeholder="Ex: Acme Ltda" />
        </div>
        <div class="form-group">
          <label>CPF / CNPJ</label>
          <input type="text" id="f-cpf" placeholder="Ex: 123.456.789-00" />
        </div>

        <button class="btn btn-primary" onclick="salvar()">Salvar</button>
        <button class="btn btn-cancel" id="btn-cancel" onclick="cancelarEdicao()" style="display:none">Cancelar edição</button>
      </div>
    </div>
  </div>

  <div>
    <div class="card">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Buscar por nome ou e-mail..." onkeydown="if(event.key==='Enter') buscar()" />
        <button class="btn-search" onclick="buscar()">Buscar</button>
        <button class="btn-clear"  onclick="limparBusca()">Limpar</button>
      </div>
      <div class="card-header">
        <h2>Clientes cadastrados</h2>
        <span class="count-badge" id="count">0</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>E-mail</th>
              <th>Telefone</th>
              <th>Cidade</th>
              <th>Empresa</th>
              <th>CPF/CNPJ</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
const API = '';

function toast(msg, tipo = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + tipo;
  setTimeout(() => t.className = '', 2800);
}

async function carregar() {
  const res  = await fetch(`${API}/usuarios`);
  const json = await res.json();
  renderTabela(json.data || []);
}

function vazio(v) { return v == null || v === '' ? '—' : v; }

function renderTabela(clientes) {
  const tbody = document.getElementById('tbody');
  document.getElementById('count').textContent = clientes.length;

  if (!clientes.length) {
    tbody.innerHTML = '<tr><td colspan="8"><div class="empty">Nenhum cliente cadastrado ainda.</div></td></tr>';
    return;
  }

  tbody.innerHTML = clientes.map(c => `
    <tr>
      <td><strong>#${c.id}</strong></td>
      <td>${c.nome}</td>
      <td>${c.email}</td>
      <td>${vazio(c.telefone)}</td>
      <td>${vazio(c.cidade)}</td>
      <td>${vazio(c.empresa)}</td>
      <td>${vazio(c.cpf_cnpj)}</td>
      <td>
        <div class="td-actions">
          <button class="btn-edit" onclick='editar(${JSON.stringify(c)})'>Editar</button>
          <button class="btn-del"  onclick="deletar(${c.id}, '${c.nome}')">Deletar</button>
        </div>
      </td>
    </tr>
  `).join('');
}

async function salvar() {
  const id = document.getElementById('edit-id').value;
  const nome     = document.getElementById('f-nome').value.trim();
  const email    = document.getElementById('f-email').value.trim();
  const telefone = document.getElementById('f-telefone').value.trim();
  const cidade   = document.getElementById('f-cidade').value.trim();
  const empresa  = document.getElementById('f-empresa').value.trim();
  const cpf_cnpj = document.getElementById('f-cpf').value.trim();

  if (!nome)  return toast('Preencha o nome.', 'error');
  if (!email) return toast('Preencha o e-mail.', 'error');

  const body = { nome, email };
  if (telefone) body.telefone = telefone;
  if (cidade)   body.cidade   = cidade;
  if (empresa)  body.empresa  = empresa;
  if (cpf_cnpj) body.cpf_cnpj = cpf_cnpj;

  const url    = id ? `${API}/usuarios/${id}` : `${API}/usuarios`;
  const method = id ? 'PUT' : 'POST';

  const res  = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const json = await res.json();

  if (json.status === 'ok') {
    toast(id ? 'Cliente atualizado!' : 'Cliente criado!');
    cancelarEdicao();
    carregar();
  } else {
    toast(json.mensagem, 'error');
  }
}

function editar(c) {
  document.getElementById('edit-id').value    = c.id;
  document.getElementById('f-nome').value     = c.nome;
  document.getElementById('f-email').value    = c.email;
  document.getElementById('f-telefone').value = c.telefone || '';
  document.getElementById('f-cidade').value   = c.cidade   || '';
  document.getElementById('f-empresa').value  = c.empresa  || '';
  document.getElementById('f-cpf').value      = c.cpf_cnpj || '';
  document.getElementById('form-mode').textContent = `Editando #${c.id}`;
  document.getElementById('form-mode').className   = 'form-mode mode-editar';
  document.getElementById('btn-cancel').style.display = 'block';
  document.getElementById('f-nome').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelarEdicao() {
  ['edit-id','f-nome','f-email','f-telefone','f-cidade','f-empresa','f-cpf'].forEach(id =>
    document.getElementById(id).value = ''
  );
  document.getElementById('form-mode').textContent = 'Novo cliente';
  document.getElementById('form-mode').className   = 'form-mode mode-criar';
  document.getElementById('btn-cancel').style.display = 'none';
}

async function deletar(id, nome) {
  if (!confirm(`Deletar "${nome}"?`)) return;
  const res  = await fetch(`${API}/usuarios/${id}`, { method: 'DELETE' });
  const json = await res.json();
  if (json.status === 'ok') { toast('Cliente deletado.'); carregar(); }
  else toast(json.mensagem, 'error');
}

async function buscar() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return carregar();
  if (q.includes('@')) {
    const res  = await fetch(`${API}/usuarios/buscar/email?q=${encodeURIComponent(q)}`);
    const json = await res.json();
    json.status === 'ok' ? renderTabela([json.data]) : (renderTabela([]), toast('Nenhum resultado.', 'error'));
  } else {
    const res  = await fetch(`${API}/usuarios/buscar/nome?q=${encodeURIComponent(q)}`);
    const json = await res.json();
    renderTabela(json.data || []);
    if (!json.data?.length) toast('Nenhum resultado.', 'error');
  }
}

function limparBusca() {
  document.getElementById('search-input').value = '';
  carregar();
}

carregar();
</script>
</body>
</html>
